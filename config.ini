# source type
source = file_jsonl

# input JSONL file for offline replay of raw RIS Live messages
input_file = examples/ris_live_messages.jsonl

# 0 means unlimited, otherwise stop after N raw messages
max_messages = 0

# Snapshot restore/save
snapshot_input =
snapshot_output = snapshot.txt

# Optional periodic growth stats sampling
stats_output_enabled = false
stats_interval_ms = 1000

# Plateau detection heuristic based on average prefix growth rate
plateau_detection_enabled = true
plateau_window_samples = 300
plateau_prefix_rate_threshold = 5.0
plateau_min_runtime_sec = 600

# Optional local graceful stop helper
stop_on_keypress = false

# RIS Live WebSocket settings
ris_live_host = ris-live.ripe.net
ris_live_port = 443
ris_live_target = /v1/ws/

# output tables
prefix_output = prefix_to_asn.tsv
asn_output = asn_to_prefix.tsv
